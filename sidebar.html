<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Sidebar | Saquib Monaf</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome Icons -->
    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="sidebarstyle.css">
</head>

<body>

    <div class="main_box">

        <!-- Sidebar Toggle -->
        <input type="checkbox" id="check">

        <!-- Open Sidebar Button -->
        <div class="btn_one">
            <label for="check" aria-label="Open Menu">
                <i class="fa-solid fa-bars"></i>
            </label>
        </div>

        <!-- Sidebar -->
        <div class="sidebar_menu">

            <!-- Logo -->
            <div class="logo">
                <a href="#">SAQUIB.</a>
            </div>

            <!-- Close Sidebar Button -->
            <div class="btn_two">
                <label for="check" aria-label="Close Menu">
                    <i class="fa-solid fa-xmark"></i>
                </label>
            </div>

            <!-- Navigation Menu -->
            <div class="menu">
                <ul>

                    <li>
                        <i class="fa-solid fa-house"></i>
                        <a href="#home">Home</a>
                    </li>

                    <li>
                        <i class="fa-solid fa-user"></i>
                        <a href="#about">About</a>
                    </li>

                    <li>
                        <i class="fa-solid fa-code"></i>
                        <a href="#skills">Skills</a>
                    </li>

                    <li>
                        <i class="fa-solid fa-laptop-code"></i>
                        <a href="#projects">Projects</a>
                    </li>

                    <li>
                        <i class="fa-solid fa-phone"></i>
                        <a href="#contact">Contact</a>
                    </li>

                    <li>
                        <i class="fa-regular fa-comments"></i>
                        <a href="#feedback">Feedback</a>
                    </li>

                </ul>
            </div>

            <!-- Social Media -->
            <div class="social_media">

                <a href="#" target="_blank" rel="noopener" aria-label="Facebook">
                    <i class="fa-brands fa-facebook"></i>
                </a>

                <a href="#" target="_blank" rel="noopener" aria-label="Twitter">
                    <i class="fa-brands fa-twitter"></i>
                </a>

                <a href="#" target="_blank" rel="noopener" aria-label="Instagram">
                    <i class="fa-brands fa-instagram"></i>
                </a>

                <a href="#" target="_blank" rel="noopener" aria-label="YouTube">
                    <i class="fa-brands fa-youtube"></i>
                </a>

            </div>

        </div>

    </div>

</body>
</html>
